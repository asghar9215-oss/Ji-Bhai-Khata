name: Build Android Master Webview App

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'ایپ کا نام درج کریں'
        required: true
        default: 'Ji Bhai Khata'
      package_name:
        description: 'پیکیج کا نام (com.example.app)'
        required: true
        default: 'com.stylelink.jibhaikhata'
      version_code:
        description: 'ورژن کوڈ لکھیں (یہ ہمیشہ پچھلی بلڈ سے بڑا نمبر ہونا چاہیے)'
        required: true
        default: '10008'
      version_name:
        description: 'ورژن کا نام لکھیں (جیسے 1.0.8)'
        required: true
        default: '1.0.8'
      blogger_url:
        description: 'اپنے بلاگر یا ایپ کا لائیو لنک یہاں پیسٹ کریں'
        required: true
        default: 'https://dakansling.blogspot.com/?m=1'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Android Project Directory
        run: |
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          PKG_PATH=$(echo "${{ github.event.inputs.package_name }}" | tr '.' '/')
          mkdir -p "app/src/main/java/$PKG_PATH"

      # 🎨 اینڈرائیڈ کا اپنا ویکٹر ڈیجیٹل لوگو تیار کرنا جو کبھی کریش نہیں ہو سکتا
      - name: Generate High Quality XML App Icon
        run: |
          cat << 'EOF' > app/src/main/res/drawable/ic_launcher_foreground.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M54,54m-30,0a30,30 0,1 1,60 0a30,30 0,1 1,-60 0"/>
          </vector>
          EOF

      - name: Generate Android Native Java Source Code
        run: |
          PKG_PATH=$(echo "${{ github.event.inputs.package_name }}" | tr '.' '/')
          cat << 'EOF' > "app/src/main/java/$PKG_PATH/MainActivity.java"
          package ${{ github.event.inputs.package_name }};

          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.GeolocationPermissions;
          import android.webkit.WebChromeClient;
          import android.webkit.ValueCallback;
          import android.webkit.URLUtil;
          import android.os.Build;
          import android.os.Environment;
          import android.app.DownloadManager;
          import android.content.Context;
          import android.widget.Toast;
          import android.print.PrintAttributes;
          import android.print.PrintDocumentAdapter;
          import android.print.PrintManager;

          public class MainActivity extends Activity {
              private WebView myWebView;
              private ValueCallback<Uri[]> uploadMessage;
              private final static int FILECHOOSER_RESULTCODE = 1;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      requestPermissions(new String[]{
                              "android.permission.ACCESS_FINE_LOCATION",
                              "android.permission.ACCESS_COARSE_LOCATION"
                      }, 1);
                  }

                  myWebView = new WebView(this);
                  WebSettings webSettings = myWebView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setAllowFileAccess(true);
                  webSettings.setGeolocationEnabled(true);
                  webSettings.setDatabaseEnabled(true);
                  webSettings.setAllowContentAccess(true);
                  webSettings.setMediaPlaybackRequiresUserGesture(false);
                  
                  webSettings.setUseWideViewPort(false);
                  webSettings.setLoadWithOverviewMode(false);

                  myWebView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          if (url == null) return false;
                          
                          if (url.startsWith("tel:")) {
                              Intent intent = new Intent(Intent.ACTION_DIAL, Uri.parse(url));
                              startActivity(intent);
                              return true;
                          }
                          
                          if (url.startsWith("whatsapp:") || url.contains("api.whatsapp.com") || url.contains("wa.me")) {
                              try {
                                  Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                                  intent.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                                  startActivity(intent);
                                  return true;
                              } catch (Exception e) {
                                  Toast.makeText(MainActivity.this, "موبائل میں واٹس ایپ انسٹال نہیں ہے!", Toast.LENGTH_SHORT).show();
                                  return true;
                              }
                          }

                          if (url.contains("maps.google.com") || url.startsWith("geo:")) {
                              try {
                                  Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                                  startActivity(intent);
                                  return true;
                              } catch (Exception e) {
                                  Toast.makeText(MainActivity.this, "گوگل میپس ایپ نہیں ملی!", Toast.LENGTH_SHORT).show();
                                  return true;
                              }
                          }
                          return false;
                      }
                  });

                  myWebView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onGeolocationPermissionsShowPrompt(String origin, GeolocationPermissions.Callback callback) {
                          callback.invoke(origin, true, false);
                      }

                      @Override
                      public boolean onShowFileChooser(WebView webView, ValueCallback<Uri[]> filePathCallback, WebChromeClient.FileChooserParams fileChooserParams) {
                          if (uploadMessage != null) {
                              uploadMessage.onReceiveValue(null);
                          }
                          uploadMessage = filePathCallback;
                          Intent intent = fileChooserParams.createIntent();
                          try {
                              startActivityForResult(intent, FILECHOOSER_RESULTCODE);
                          } catch (Exception e) {
                              uploadMessage = null;
                              return false;
                          }
                          return true;
                      }
                  });

                  myWebView.setDownloadListener((downloadUrl, userAgent, contentDisposition, mimeType, contentLength) -> {
                      try {
                          DownloadManager.Request request = new DownloadManager.Request(Uri.parse(downloadUrl));
                          request.setMimeType(mimeType);
                          request.setDescription("فائل ڈاؤن لوڈ ہو رہی ہے...");
                          request.setTitle(URLUtil.guessFileName(downloadUrl, contentDisposition, mimeType));
                          request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                          request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, URLUtil.guessFileName(downloadUrl, contentDisposition, mimeType));
                          
                          DownloadManager dm = (DownloadManager) getSystemService(Context.DOWNLOAD_SERVICE);
                          if (dm != null) {
                              dm.enqueue(request);
                              Toast.makeText(MainActivity.this, "ڈاؤن لوڈنگ شروع ہو چکی ہے...", Toast.LENGTH_LONG).show();
                          }
                      } catch (Exception e) {
                          Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(downloadUrl));
                          startActivity(intent);
                      }
                  });

                  myWebView.addJavascriptInterface(new Object() {
                      @android.webkit.JavascriptInterface
                      public void printPage() {
                          runOnUiThread(new Runnable() {
                              @Override
                              public void run() {
                                  createWebPrintJob(myWebView);
                              }
                          });
                      }
                  }, "AndroidPrint");

                  myWebView.loadUrl("${{ github.event.inputs.blogger_url }}");
                  setContentView(myWebView);
              }

              private void createWebPrintJob(WebView webView) {
                  if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.KITKAT) {
                      PrintManager printManager = (PrintManager) this.getSystemService(Context.PRINT_SERVICE);
                      String jobName = "Ji_Bhai_Khata_Document";
                      PrintDocumentAdapter printAdapter = webView.createPrintDocumentAdapter(jobName);
                      if (printManager != null) {
                          printManager.print(jobName, printAdapter, new PrintAttributes.Builder().build());
                      }
                  }
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == FILECHOOSER_RESULTCODE) {
                      if (uploadMessage == null) return;
                      uploadMessage.onReceiveValue(WebChromeClient.FileChooserParams.parseResult(resultCode, data));
                      uploadMessage = null;
                  }
              }

              @Override
              public void onBackPressed() {
                  if (myWebView.canGoBack()) {
                      myWebView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      # 🛠️ مینی فیسٹ سے پیکیج ٹیگ ہٹا دیا گیا ہے تاکہ گریڈل ایرر نہ دے
      - name: Generate Android Manifest File
        run: |
          cat << EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />

              <application
                  android:allowBackup="true"
                  android:label="${{ github.event.inputs.app_name }}"
                  android:icon="@drawable/ic_launcher_foreground"
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen"
                  android:usesCleartextTraffic="true">
                  
                  <activity android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Generate Permanent Master Keystore and Reset Pem
        run: |
          keytool -genkey -v -keystore app/jibhaikhata_master.keystore -alias jibhaikhata_master_key -keyalg RSA -keysize 2048 -validity 10000 -storepass "jibhaikhataPass786" -keypass "jibhaikhataPass786" -dname "CN=StyleLink, OU=App, O=jibhaikhata, L=Lahore, S=Punjab, C=PK"
          keytool -export -rfc -keystore app/jibhaikhata_master.keystore -alias jibhaikhata_master_key -file app/upload_certificate.pem -storepass "jibhaikhataPass786"

      - name: Generate Build Gradle Configuration
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "stylelink-jibhaikhata"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          EOF

          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "${{ github.event.inputs.package_name }}"
              compileSdk 35
              signingConfigs { release { storeFile file("jibhaikhata_master.keystore"); storePassword "jibhaikhataPass786"; keyAlias "jibhaikhata_master_key"; keyPassword "jibhaikhataPass786" } }
              
              defaultConfig { 
                  applicationId "${{ github.event.inputs.package_name }}"
                  minSdk 24
                  targetSdk 35
                  versionCode ${{ github.event.inputs.version_code }}
                  versionName "${{ github.event.inputs.version_name }}"
              }
              buildTypes { release { minifyEnabled false; signingConfig signingConfigs.release } }
          }
          EOF
          echo "org.gradle.jvmargs=-Xmx2048m" > gradle.properties

      - name: Build Official Signed AAB and APK Files
        run: |
          export GRADLE_USER_HOME=$HOME/.gradle_clean
          gradle wrapper --gradle-version 8.5
          ./gradlew :app:bundleRelease :app:assembleRelease --no-build-cache

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jibhaikhata_PlayStore_And_Reset_Key
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release.apk
            app/upload_certificate.pem
