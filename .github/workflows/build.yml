name: Generate Play Store Bundle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Java Development Kit (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Initialize Android Base Project
      run: |
        # گریڈل کو بتانے کے لیے کہ 'app' ایک ماڈیول ہے، settings.gradle بنانا ضروری ہے
        cat <<EOF > settings.gradle
        include ':app'
        rootProject.name = "Ji-Bhai-Khata"
        EOF

        # مین پروجیکٹ کی build.gradle بنانا
        cat <<EOF > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        # ایپ کے فولڈرز اور فائلز تیار کرنا
        mkdir -p app/src/main/assets
        cp index.html app/src/main/assets/index.html
        
        # ایک بنیادی اینڈرائیڈ مینی فیسٹ فائل بنانا جو بلڈ کے لیے لازمی ہے
        mkdir -p app/src/main
        cat <<EOF > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.stylelink.jibhaikhata">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
                android:allowBackup="true"
                android:label="Ji Bhai Khata"
                android:supportsRtl="true"
                android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # ایپ کی اپنی build.gradle فائل تیار کرنا
        cat <<EOF > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.stylelink.jibhaikhata'
            compileSdk 34
            defaultConfig {
                applicationId "com.stylelink.jibhaikhata"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0.0"
            }
            signingConfigs {
                release {
                    storeFile file("release-key.jks")
                    storePassword "${{ secrets.KEYSTORE_PASSWORD }}"
                    keyAlias "${{ secrets.KEY_ALIAS }}"
                    keyPassword "${{ secrets.KEY_PASSWORD }}"
                }
            }
            buildTypes {
                release {
                    signingConfig signingConfigs.release
                    minifyEnabled false
                }
            }
        }
        EOF

    - name: Generate Secure Keystore
      run: |
        keytool -genkey -v -keystore app/release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias "${{ secrets.KEY_ALIAS }}" -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -keypass "${{ secrets.KEY_PASSWORD }}" -dname "CN=JiBhaiKhata, O=StyleLink, L=Lahore, S=Punjab, C=PK"

    - name: Create Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Compile and Build APK & AAB Bundle
      run: |
        chmod +x gradlew
        ./gradlew app:bundleRelease app:assembleRelease

    - name: Output Upload - Google Play Store (.AAB)
      uses: actions/upload-artifact@v4
      with:
        name: Ji-Bhai-Khata-PlayStore-Bundle
        path: app/build/outputs/bundle/release/app-release.aab

    - name: Output Upload - Tester (.APK)
      uses: actions/upload-artifact@v4
      with:
        name: Ji-Bhai-Khata-Testing-APK
        path: app/build/outputs/apk/release/app-release.apk
