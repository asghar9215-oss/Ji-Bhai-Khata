name: Generate Play Store Bundle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Java Development Kit (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Initialize Android Base Project
      run: |
        # یہاں گٹ ہب ایک مکمل اینڈرائیڈ ایپ کا سٹرکچر خود تیار کرے گا
        # اور پیکیج نام com.stylelink.jibhaikhata سیٹ کرے گا
        mkdir -p app/src/main/assets
        cp index.html app/src/main/assets/index.html
        
        # گریڈل بلڈ کی بنیادی فائلز بنانا
        cat <<EOF > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        mkdir -p app
        cat <<EOF > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.stylelink.jibhaikhata'
            compileSdk 34
            defaultConfig {
                applicationId "com.stylelink.jibhaikhata"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0.0"
            }
            signingConfigs {
                release {
                    storeFile file("release-key.jks")
                    storePassword "${{ secrets.KEYSTORE_PASSWORD }}"
                    keyAlias "${{ secrets.KEY_ALIAS }}"
                    keyPassword "${{ secrets.KEY_PASSWORD }}"
                }
            }
            buildTypes {
                release {
                    signingConfig signingConfigs.release
                    minifyEnabled false
                }
            }
        }
        EOF

    - name: Generate Secure Keystore
      run: |
        keytool -genkey -v -keystore app/release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias "${{ secrets.KEY_ALIAS }}" -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -keypass "${{ secrets.KEY_PASSWORD }}" -dname "CN=JiBhaiKhata, O=StyleLink, L=Lahore, S=Punjab, C=PK"

    - name: Create Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Compile and Build APK & AAB Bundle
      run: |
        chmod +x gradlew
        ./gradlew app:bundleRelease app:assembleRelease

    - name: Output Upload - Google Play Store (.AAB)
      uses: actions/upload-artifact@v4
      with:
        name: Ji-Bhai-Khata-PlayStore-Bundle
        path: app/build/outputs/bundle/release/app-release.aab

    - name: Output Upload - Tester (.APK)
      uses: actions/upload-artifact@v4
      with:
        name: Ji-Bhai-Khata-Testing-APK
        path: app/build/outputs/apk/release/app-release.apk
