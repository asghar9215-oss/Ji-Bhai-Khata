name: Generate Play Store Bundle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Java Development Kit (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Initialize Android Base Project
      run: |
        # settings.gradle بنانا
        cat <<EOF > settings.gradle
        include ':app'
        rootProject.name = "Ji-Bhai-Khata"
        EOF

        # مین پروجیکٹ کی build.gradle بنانا
        cat <<EOF > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        # ایپ کے فولڈرز تیار کرنا
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/java/com/stylelink/jibhaikhata
        
        # آپ کی انڈیکس فائل کو ایسٹس فولڈر میں منتقل کرنا
        cp index.html app/src/main/assets/index.html
        
        # اینڈرائیڈ مینی فیسٹ فائل (اوپر کا وائٹ ٹائٹل بار ختم کرنے کے لیے NoActionBar سیٹ کیا ہے)
        cat <<EOF > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.stylelink.jibhaikhata">
            
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.CALL_PHONE" />
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
            <uses-permission android:name="com.android.alarm.permission.SET_ALARM" />

            <application
                android:allowBackup="true"
                android:label="Ji Bhai Khata"
                android:supportsRtl="true"
                android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # سپر MainActivity.java جو تمام 5 فیچرز اور فکسڈ پرنٹ ہسٹری کو سنبھالے گی
        cat <<EOF > app/src/main/java/com/stylelink/jibhaikhata/MainActivity.java
        package com.stylelink.jibhaikhata;

        import android.app.Activity;
        import android.content.Context;
        import android.content.Intent;
        import android.net.Uri;
        import android.os.Bundle;
        import android.print.PrintAttributes;
        import android.print.PrintDocumentAdapter;
        import android.print.PrintManager;
        import android.provider.AlarmClock;
        import android.webkit.WebChromeClient;
        import android.webkit.WebSettings;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import android.widget.Toast;

        public class MainActivity extends Activity {
            private WebView myWebView;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                
                myWebView = new WebView(this);
                WebSettings webSettings = myWebView.getSettings();
                
                // جاوا اسکرپٹ اور لوکل اسٹوریج کو مکمل اجازت دینا
                webSettings.setJavaScriptEnabled(true);
                webSettings.setDomStorageEnabled(true);
                webSettings.setAllowFileAccess(true);
                webSettings.setAllowContentAccess(true);
                webSettings.setDatabaseEnabled(true);
                
                // الرٹس اور پاپ اپس کے لیے
                myWebView.setWebChromeClient(new WebChromeClient());

                // موبائل کے نیٹیو فیچرز (WhatsApp, Call, Location, Alarm) کو ایکٹو کرنا
                myWebView.setWebViewClient(new WebViewClient() {
                    @Override
                    public boolean shouldOverrideUrlLoading(WebView view, String url) {
                        if (url == null) return false;

                        // 1. واٹس ایپ ہینڈلر
                        if (url.startsWith("whatsapp:") || url.contains("api.whatsapp.com") || url.contains("wa.me")) {
                            return launchIntent(url, "WhatsApp is not installed");
                        }
                        
                        // 2. فون کال ہینڈلر (tel:)
                        if (url.startsWith("tel:")) {
                            return launchIntent(url, "Cannot open dialer");
                        }

                        // 3. گوگل میپس / لوکیشن ہینڈلر (geo: یا maps)
                        if (url.startsWith("geo:") || url.contains("maps.google.com")) {
                            return launchIntent(url, "Maps app not found");
                        }

                        // 4. الارم ہینڈلر (alarm:)
                        if (url.startsWith("alarm:")) {
                            try {
                                Intent intent = new Intent(AlarmClock.ACTION_SET_ALARM);
                                intent.putExtra(AlarmClock.EXTRA_MESSAGE, "جی بھائی کھاتا ریمائنڈر");
                                startActivity(intent);
                                return true;
                            } catch (Exception e) {
                                Toast.makeText(MainActivity.this, "Alarm App not found", Toast.LENGTH_SHORT).show();
                                return true;
                            }
                        }

                        return false;
                    }
                });

                // جاوا اسکرپٹ کے ذریعے window.print() کو اینڈرائیڈ میں چلانے کا طریقہ
                myWebView.addJavascriptInterface(new Object() {
                    @android.webkit.JavascriptInterface
                    public void printPage() {
                        runOnUiThread(new Runnable() {
                            @Override
                            public void run() {
                                createWebPrintJob(myWebView);
                            }
                        });
                    }
                }, "AndroidPrint");

                // انڈیکس فائل لوڈ کرنا
                myWebView.loadUrl("file:///android_asset/index.html");
                setContentView(myWebView);
            }

            // موبائل ایپس اوپن کرنے کا مشترکہ فنکشن
            private boolean launchIntent(String url, String errorMessage) {
                try {
                    Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                    startActivity(intent);
                    return true;
                } catch (Exception e) {
                    Toast.makeText(MainActivity.this, errorMessage, Toast.LENGTH_SHORT).show();
                    return true;
                }
            }

            // لائیو ڈیٹا پرنٹ کرنے والا انجن (صفحہ سفید نہیں آئے گا)
            private void createWebPrintJob(WebView webView) {
                if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.KITKAT) {
                    PrintManager printManager = (PrintManager) this.getSystemService(Context.PRINT_SERVICE);
                    String jobName = "Ji_Bhai_Khata_Document";
                    PrintDocumentAdapter printAdapter = webView.createPrintDocumentAdapter(jobName);
                    if (printManager != null) {
                        printManager.print(jobName, printAdapter, new PrintAttributes.Builder().build());
                    }
                }
            }

            @Override
            public void onBackPressed() {
                if (myWebView.canGoBack()) {
                    myWebView.goBack();
                } else {
                    super.onBackPressed();
                }
            }
        }
        EOF

        # ایپ کی اپنی build.gradle فائل تیار کرنا (TARGET SDK 35)
        cat <<EOF > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.stylelink.jibhaikhata'
            compileSdk 35
            defaultConfig {
                applicationId "com.stylelink.jibhaikhata"
                minSdk 24
                targetSdk 35
                versionCode 1
                versionName "1.0.0"
            }
            signingConfigs {
                release {
                    storeFile file("release-key.jks")
                    storePassword "${{ secrets.KEYSTORE_PASSWORD }}"
                    keyAlias "${{ secrets.KEY_ALIAS }}"
                    keyPassword "${{ secrets.KEY_PASSWORD }}"
                }
            }
            buildTypes {
                release {
                    signingConfig signingConfigs.release
                    minifyEnabled false
                }
            }
        }
        EOF

    - name: Generate Secure Keystore
      run: |
        keytool -genkey -v -keystore app/release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias "${{ secrets.KEY_ALIAS }}" -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -keypass "${{ secrets.KEY_PASSWORD }}" -dname "CN=JiBhaiKhata, O=StyleLink, L=Lahore, S=Punjab, C=PK"

    - name: Create Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Compile and Build APK & AAB Bundle
      run: |
        chmod +x gradlew
        ./gradlew app:bundleRelease app:assembleRelease

    - name: Output Upload - Google Play Store (.AAB)
      uses: actions/upload-artifact@v4
      with:
        name: Ji-Bhai-Khata-PlayStore-Bundle
        path: app/build/outputs/bundle/release/app-release.aab

    - name: Output Upload - Tester (.APK)
      uses: actions/upload-artifact@v4
      with:
        name: Ji-Bhai-Khata-Testing-APK
        path: app/build/outputs/apk/release/app-release.apk
